<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 360px;
    max-height: 600px;
    overflow-y: auto;
    background: #0f0f0f;
    color: #eee;
    font: 13px/1.4 "Segoe UI", Roboto, sans-serif;
  }
  #header {
    padding: 10px 12px 8px;
    font-size: 12px;
    color: #aaa;
    border-bottom: 1px solid #222;
    letter-spacing: .3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #health-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    vertical-align: middle;
    margin-right: 6px;
    flex-shrink: 0;
    transition: background .3s;
  }
  #health-dot.ok   { background: #2ecc71; }
  #health-dot.warn { background: #f39c12; }
  #stats {
    font-size: 11px;
    color: #555;
  }
  #stats .indexed { color: #4a9eff; }
  .hint {
    font-size: 11px;
    color: #666;
    margin-left: 6px;
  }
  .hint kbd {
    font: 10px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 1px 4px;
    color: #bbb;
  }
  #search-row {
    display: flex;
    gap: 6px;
    padding: 10px 10px 6px;
  }
  #q {
    flex: 1;
    background: #222;
    border: 1px solid #444;
    border-radius: 4px;
    color: #eee;
    font-size: 13px;
    padding: 6px 9px;
    outline: none;
  }
  #q:focus { border-color: #f00; }
  #btn {
    background: #f00;
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    padding: 6px 12px;
  }
  #btn:hover { background: #c00; }
  #status {
    padding: 0 12px 6px;
    font-size: 11px;
    color: #888;
    min-height: 18px;
  }
  #results {}
  .result {
    display: block;
    padding: 8px 12px;
    border-top: 1px solid #1e1e1e;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .result:hover { background: #1a1a1a; }
  .result-title {
    font-size: 12px;
    color: #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-time {
    font-size: 11px;
    color: #f00;
    margin-top: 2px;
  }
  .result-date {
    font-size: 11px;
    color: #4a9eff;
    margin-left: 8px;
  }
  .folder-toggle {
    padding: 4px 12px 4px 28px;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    background: #0a0a0a;
    border-top: 1px solid #181818;
    user-select: none;
  }
  .folder-toggle:hover { color: #999; background: #111; }
  .folder-inner .result {
    padding-left: 28px;
    background: #0d0d0d;
  }
  .folder-inner .result:hover { background: #151515; }
</style>
</head>
<body>
<div id="header"><span><span id="health-dot"></span>reeLm<span class="hint"><kbd>Shift+Y</kbd> indexes video</span></span><span id="stats"></span></div>
<div id="search-row">
  <input id="q" type="text" placeholder="Search saved videos…" autofocus>
  <button id="btn">Search</button>
</div>
<div id="status"></div>
<div id="results"></div>
<script src="popup.js"></script>
</body>
</html>
