<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>reeLm — Options</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #eee;
    font: 14px/1.5 "Segoe UI", Roboto, sans-serif;
    padding: 32px;
    max-width: 560px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    color: #f00;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 32px;
  }
  section {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
  }
  section h2 {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .stats-line {
    color: #eee;
    font-size: 14px;
  }
  .stats-line .indexed { color: #4a9eff; }
  .stats-line .total   { color: #eee; }
  .danger {
    border-color: #4a1818;
  }
  .danger h2 { color: #f55; }
  .danger p {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 14px;
  }
  button {
    background: #c00;
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    padding: 8px 14px;
  }
  button:hover { background: #a00; }
  button:disabled {
    background: #333;
    color: #777;
    cursor: not-allowed;
  }
  #status {
    margin-top: 12px;
    font-size: 12px;
    color: #4a9eff;
    min-height: 18px;
  }
  #status.error { color: #f55; }
</style>
</head>
<body>
<h1>reeLm</h1>
<div class="subtitle">Options &middot; <span id="version"></span></div>

<section>
  <h2>Library</h2>
  <div class="stats-line" id="stats">Loading…</div>
</section>

<section class="danger">
  <h2>Wipe library</h2>
  <p>Permanently deletes every saved video and its transcript from the local database. This cannot be undone.</p>
  <button id="wipe">Wipe all saved videos</button>
  <div id="status"></div>
</section>

<script src="options.js"></script>
</body>
</html>
